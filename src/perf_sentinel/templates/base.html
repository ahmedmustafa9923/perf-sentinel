<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Perf Sentinel{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6"></script>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header .subtitle { color: var(--muted); font-size: 13px; }
    main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
    tr:last-child td { border-bottom: none; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-passed   { background: rgba(63,185,80,0.15);  color: var(--green); }
    .badge-regressed{ background: rgba(248,81,73,0.15);  color: var(--red); }
    .badge-failed   { background: rgba(248,81,73,0.25);  color: var(--red); }
    .badge-unknown  { background: rgba(139,148,158,0.15);color: var(--muted); }
    .delta-up   { color: var(--red); font-weight: 600; }
    .delta-down { color: var(--green); font-weight: 600; }
    .delta-flat { color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, monospace; }
  </style>
</head>
<body>
  <header>
    <h1>🛡️ Perf Sentinel</h1>
    <span class="subtitle">CI performance observability</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
